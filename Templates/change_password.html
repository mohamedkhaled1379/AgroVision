<!DOCTYPE html>
<html lang="{{ current_lang }}" dir="{{ 'rtl' if is_rtl else 'ltr' }}">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ t('change_password_btn') }} — {{ t('brand') }}</title>

<!-- FONTS (same system) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
{% if is_rtl %}
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Arabic','DM Sans',sans-serif!important;}</style>
{% endif %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --accent:#00ff88;
    --accent2:#00e6ff;
    --bg:#020b14;
}

/* BACKGROUND */
body{
    margin:0;
    padding:0;
    font-family:'DM Sans',sans-serif;
    color:#fff;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,200,0.18), transparent 55%),
        radial-gradient(circle at 85% 10%, rgba(0,150,255,0.22), transparent 60%),
        radial-gradient(circle at 60% 85%, rgba(0,255,180,0.15), transparent 70%),
        radial-gradient(circle at 10% 90%, rgba(0,120,255,0.12), transparent 65%),
        var(--bg);
}

/* GLOW */
.glow{
    position:fixed;
    width:400px;
    height:400px;
    border-radius:50%;
    filter:blur(140px);
    opacity:0.35;
    z-index:-10;
}
.glow-green{background:#00ffcc;}
.glow-blue{background:#009dff;}

/* NAVBAR */
.navbar{
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,255,180,0.1);
}
.navbar-brand{
    font-family:'Syne',sans-serif;
    font-weight:800;
    color:var(--accent)!important;
}

/* PAGE */
.page{
    max-width:500px;
    margin:auto;
    padding:120px 20px 40px;
    text-align:center;
}

/* TITLE */
h2{
    font-family:'Syne',sans-serif;
    font-weight:800;
    color:var(--accent);
    text-shadow:0 0 15px rgba(0,255,150,0.25);
}

/* CARD */
.box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,150,0.25);
    border-radius:15px;
    padding:30px;
    backdrop-filter:blur(7px);
    box-shadow:0 0 25px rgba(0,255,150,0.08);
}

/* INPUT */
.form-control{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(0,255,150,0.3);
    color:#fff;
    margin-bottom:15px;
}
.form-control:focus{
    border-color:var(--accent);
    box-shadow:0 0 10px rgba(0,255,170,0.3);
}

/* BUTTON */
.btn-main{
    background:linear-gradient(90deg,#00c26e,#00e6ff);
    border:none;
    padding:12px 25px;
    border-radius:40px;
    font-weight:600;
    color:#fff;
    width:100%;
    transition:0.3s;
}
.btn-main:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px rgba(0,255,200,0.5);
}

/* ALERT */
.alert{
    border-radius:10px;
}

</style>
</head>

<body>

<!-- GLOW -->
<div class="glow glow-green" style="top:-80px;left:-60px;"></div>
<div class="glow glow-blue" style="top:50px;right:-120px;"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand mb-0" href="{{ url_for('home') }}">
        <span class="agro-lamp"></span>{{ t('brand') }}
    </a>
    {% include '_lang_nav_compact.html' %}
</div>
</nav>

<!-- PAGE -->
<div class="page">

<h2>Change Password</h2>
<p style="color:#9fb3ad;margin-bottom:25px;">Update your account password securely</p>

<div class="box">

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="alert alert-warning">{{ messages[0] }}</div>
{% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('change_password') }}">

<input type="password" name="current_password" class="form-control" placeholder="Current Password" required>

<input type="password" name="new_password" class="form-control" placeholder="New Password" required>

<input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>

<button class="btn-main mt-2">Update Password</button>

</form>

</div>
</div>

{% include '_footer.html' %}
</body>
</html>
