<!DOCTYPE html>
<html lang="{{ current_lang }}" dir="{{ 'rtl' if is_rtl else 'ltr' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — {{ t('brand') }}</title>

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
{% if is_rtl %}
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
<style>body{font-family:'Noto Sans Arabic','DM Sans',sans-serif!important;}</style>
{% endif %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --accent:#00ff88;
    --accent2:#00e6ff;
}

/* BACKGROUND */
body{
    margin:0;
    padding:0;
    font-family:'DM Sans',sans-serif;
    color:#fff;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,255,200,0.18), transparent 55%),
        radial-gradient(circle at 85% 10%, rgba(0,150,255,0.22), transparent 60%),
        radial-gradient(circle at 60% 85%, rgba(0,255,180,0.15), transparent 70%),
        radial-gradient(circle at 10% 90%, rgba(0,120,255,0.12), transparent 65%),
        #020b14;
}

/* GLOW */
.glow{
    position:fixed;
    width:420px;
    height:420px;
    border-radius:50%;
    filter:blur(140px);
    opacity:0.35;
    z-index:-10;
}
.glow-green{background:#00ffcc;}
.glow-blue{background:#009dff;}

/* NAVBAR (optional if you add later) */
.navbar{
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(0,255,180,0.1);
}

/* PAGE */
.page{
    max-width:700px;
    margin:auto;
    padding:120px 20px 40px;
    text-align:center;
}

/* TITLE */
h1{
    font-family:'Syne',sans-serif;
    font-weight:800;
    color:var(--accent);
    text-shadow:0 0 15px rgba(0,255,150,0.25);
}

/* CARD */
.box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,150,0.25);
    border-radius:15px;
    padding:30px;
    backdrop-filter:blur(7px);
    box-shadow:0 0 25px rgba(0,255,150,0.08);
    text-align:left;
}

/* TEXT */
p{
    color:#b7e4d9;
}

.info{
    margin-top:15px;
    padding:15px;
    border-radius:12px;
    background:rgba(0,255,150,0.08);
    border:1px solid rgba(0,255,150,0.2);
}

.info strong{
    color:var(--accent);
}

</style>
</head>

<body>

<!-- GLOW -->
<div class="glow glow-green" style="top:-80px;left:-60px;"></div>
<div class="glow glow-blue" style="top:50px;right:-120px;"></div>

<!-- PAGE -->
<div class="page">

<h1>Contact Us</h1>
<p>We’re here to help with support, integration, and enterprise solutions.</p>

<div class="box">

<div class="info">
<strong>Email:</strong> support@example.com
</div>

<div class="info">
<strong>Phone:</strong> +000-000-0000
</div>

<div class="info">
<strong>Response Time:</strong> 24–48 Hours
</div>

</div>

</div>

{% include '_footer.html' %}
</body>
</html>
